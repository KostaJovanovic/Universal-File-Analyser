<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#ffffff"/>
  <!-- left line -->
  <line x1="6" y1="14" x2="6" y2="50" stroke="#0a0a0a" stroke-width="3.5" stroke-linecap="square"/>
  <!-- square (36x36, matching line height) -->
  <rect x="14" y="14" width="36" height="36" fill="none" stroke="#0a0a0a" stroke-width="3.5"/>
  <!-- dot -->
  <circle cx="32" cy="32" r="5.5" fill="#e60023"/>
  <!-- right line -->
  <line x1="58" y1="14" x2="58" y2="50" stroke="#0a0a0a" stroke-width="3.5" stroke-linecap="square"/>
</svg>
