<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="3" fill="#ffffff"/>
  <g stroke="#0a0a0a" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- top-left + -->
    <line x1="3" y1="7" x2="11" y2="7"/>
    <line x1="7" y1="3" x2="7" y2="11"/>
    <!-- top-right + -->
    <line x1="21" y1="7" x2="29" y2="7"/>
    <line x1="25" y1="3" x2="25" y2="11"/>
    <!-- bottom-left + -->
    <line x1="3" y1="25" x2="11" y2="25"/>
    <line x1="7" y1="21" x2="7" y2="29"/>
    <!-- bottom-right + -->
    <line x1="21" y1="25" x2="29" y2="25"/>
    <line x1="25" y1="21" x2="25" y2="29"/>
    <!-- connecting lines -->
    <line x1="14" y1="7" x2="18" y2="7"/>
    <line x1="14" y1="25" x2="18" y2="25"/>
    <line x1="7" y1="14" x2="7" y2="18"/>
    <line x1="25" y1="14" x2="25" y2="18"/>
  </g>
  <circle cx="16" cy="16" r="3.5" fill="#e60023"/>
</svg>
