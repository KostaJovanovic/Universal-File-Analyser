<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#ffffff"/>
  <!-- left line -->
  <line x1="3" y1="7" x2="3" y2="25" stroke="#0a0a0a" stroke-width="2" stroke-linecap="square"/>
  <!-- square (18x18, matching line height) -->
  <rect x="7" y="7" width="18" height="18" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <!-- dot -->
  <circle cx="16" cy="16" r="3" fill="#e60023"/>
  <!-- right line -->
  <line x1="29" y1="7" x2="29" y2="25" stroke="#0a0a0a" stroke-width="2" stroke-linecap="square"/>
</svg>
